name: Run Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest --json-report --json-report-file=report.json

      - name: Notify Slack
        if: always()
        run: |
          python - <<'EOF'
          import json, urllib.request

          with open('report.json') as f:
              d = json.load(f)

          summary = d.get('summary', {})
          tests = d.get('tests', [])

          lines = []
          lines.append(f"テスト結果: ${{ job.status }}")
          lines.append(f"✅ passed: {summary.get('passed', 0)} / ❌ failed: {summary.get('failed', 0)} / 合計: {summary.get('total', 0)}")
          lines.append(f"⏱ 実行時間: {d.get('duration', 0):.2f}s")
          lines.append("")

          for t in tests:
              icon = "✅" if t['outcome'] == "passed" else "❌"
              name = t['nodeid'].split("::")[-1]
              duration = t.get('call', {}).get('duration', 0)
              lines.append(f"{icon} {name} ({duration*1000:.1f}ms)")

          payload = json.dumps({"text": "\n".join(lines)}).encode()
          req = urllib.request.Request(
              "${{ secrets.SLACK_WEBHOOK_URL }}",
              data=payload,
              headers={"Content-type": "application/json"}
          )
          urllib.request.urlopen(req)
          EOF
