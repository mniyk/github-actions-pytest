name: Run Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest --json-report --json-report-file=report.json

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          PASSED=$(python -c "import json; d=json.load(open('report.json')); print(d.get('summary',{}).get('passed',0))" 2>/dev/null || echo "?")
          FAILED=$(python -c "import json; d=json.load(open('report.json')); print(d.get('summary',{}).get('failed',0))" 2>/dev/null || echo "?")
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            -d "{\"text\": \"テスト結果: ${STATUS}\n✅ passed: ${PASSED} / ❌ failed: ${FAILED}\"}"
